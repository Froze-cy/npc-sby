[options]
isa rv32i
nret 1

[depth]
insn            20
reg       15    25
pc_fwd    10    30
pc_bwd    10    30
liveness  1  10 30
unique    1  10 30
causal    10    30
csrw            30
cover     1     15

[csrs]
mcycle
mepc

[defines]
`define RISCV_FORMAL_ALIGNED_MEM
`define RISCV_FORMAL_BLACKBOX_REGS
`define RISCV_FORMAL_BLACKBOX_ALU

[script-sources]
read_verilog -sv @basedir@/cores/@core@/wrapper.sv
read_verilog @basedir@/cores/@core@/vsrc/*.v

[cover]
always @* if (!reset) cover (rvfi_valid && rvfi_insn == 0x00100073);

